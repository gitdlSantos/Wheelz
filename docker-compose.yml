services:
  db:
    image: mysql:8.0
    container_name: wheelz_db
    environment:
      MYSQL_ROOT_PASSWORD: tri_force_3
      MYSQL_DATABASE: Wheelz
      MYSQL_USER: guzman
      MYSQL_PASSWORD: guzman185
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network 
    ports:
      - "3307:3307"

  php:
    image: php:8.0-fpm
    volumes: 
      - ./api:/var/www/html
    networks:
      - app-network
    depends_on:
      - db
    ports:
      - "8081:80"

  web:
    image: httpd:2.4
    volumes:
      - ./web:/usr/local/apache2/htdocs
    #  - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      - php

networks:
  app-network:
    driver: bridge 

volumes:
  db-data: